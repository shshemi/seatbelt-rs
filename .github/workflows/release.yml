name: Release

# Manually triggered from the Actions tab ("Run workflow").
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip version bump and crates.io publish)"
        type: boolean
        default: true
      release_kind:
        description: "Version bump kind (ignored on dry run)"
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Run cargo-deny
        run: cargo deny check

      - name: Run tests
        run: cargo test --release --all

      - name: Verify package builds for publishing
        run: cargo package

      - name: Install cargo-edit
        if: ${{ !inputs.dry_run }}
        run: cargo install cargo-edit --locked

      - name: Bump version
        if: ${{ !inputs.dry_run }}
        id: bump
        run: |
          cargo set-version --bump ${{ inputs.release_kind }}
          new_version=$(cargo metadata --no-deps --format-version 1 \
            | python3 -c 'import json,sys; print(json.load(sys.stdin)["packages"][0]["version"])')
          echo "version=$new_version" >> "$GITHUB_OUTPUT"
          echo "tag=v$new_version" >> "$GITHUB_OUTPUT"

      - name: Refresh Cargo.lock with bumped version
        if: ${{ !inputs.dry_run }}
        run: cargo build

      - name: Commit, tag, and push
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "Release ${{ steps.bump.outputs.tag }}"
          git tag "${{ steps.bump.outputs.tag }}"
          git push origin HEAD:main
          git push origin "${{ steps.bump.outputs.tag }}"

      - name: Publish to crates.io
        if: ${{ !inputs.dry_run }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish
